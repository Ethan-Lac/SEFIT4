name: Build and Test

# Trigger: run on every push or pull request to any branch
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Java 11 with Maven
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      # Step 3: Create data directory so JSON files can be written during tests
      - name: Create data directory
        run: mkdir -p data

      # Step 4: Build the project and run all tests
      - name: Build and run tests with Maven
        run: mvn clean test

      # Step 5: Upload test results as an artifact (optional but useful)
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: target/surefire-reports/
